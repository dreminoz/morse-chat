services:
  - type: web
    name: morse-chat
    runtime: node
    plan: free
    buildCommand: echo "No build step"
    startCommand: node server/server.js
    healthCheckPath: /api/health
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGO_DB_NAME
        value: morse_chat
